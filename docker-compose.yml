services:
  postgres:
    image: postgres:17-alpine
    container_name: go-opname-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opname
      POSTGRES_USER: opname
      POSTGRES_PASSWORD: opname
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opname -d opname"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
